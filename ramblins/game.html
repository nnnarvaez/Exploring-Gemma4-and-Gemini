<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top-Down Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  canvas {
    border: 2px solid #333;
    background: #111;
    width: 96%;
    height: 96%;
  }
  #ui {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #0f0;
    font-size: 18px;
    text-align: center;
    text-shadow: 0 0 10px #0f0;
    pointer-events: none;
  }
  #gameover {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #f00;
    font-size: 48px;
    text-align: center;
    text-shadow: 0 0 20px #f00;
    display: none;
  }
  #gameover span {
    display: block;
    font-size: 20px;
    color: #fff;
    margin-top: 20px;
  }
  #controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #666;
    font-size: 14px;
    text-align: center;
  }
  @keyframes pulse {
    from { opacity: 0.5; }
    to { opacity: 1; }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div>SCORE: <span id="score">0</span></div>
  <div>WAVE: <span id="wave">1</span> | LIVES: <span id="lives">3</span></div>
  <div style="color:#f88">ENEMIES: <span id="enemyCount">0</span></div>
  <div id="enemyCap" style="color:#f00;display:none">⚠ CAP: 40 ⚠</div>
  <div id="pauseBtn" style="color:#888;margin-top:8px;cursor:pointer;pointer-events:all" onclick="togglePause()">[PAUSE]</div>
</div>
<div id="gameover">
  GAME OVER
  <span>Press R to restart</span>
  <span style="font-size:14px;color:#888;margin-top:10px;">Tip: Don't get cornered for 15 seconds!</span>
</div>
<div id="controls">WASD to move | LMB to fire | R to restart | ESC to pause | Shoot green to kill</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 1280;
canvas.height = 720;

// Game state
let score = 0;
let wave = 1;
let lives = 3;
let gameOver = false;
let keys = {};
let bullets = [];
let enemies = [];
let particles = [];
let lastShot = 0;
const SHOT_COOLDOWN = 80;
let fireSlow = 0; // frames remaining with slowed fire
const FIRE_SLOW_DURATION = 120; // 2 seconds at 60fps
const FIRE_SLOW_COOLDOWN = 600; // 600ms instead of 150ms
let corneredTimer = 0; // frames spent cornered
const CORNERED_THRESHOLD = 900; // 15 seconds at 60fps
const MAX_ENEMIES = 200;
let paused = false;

// 5 enemy types: [size, speedMult, color, scoreValue, chases]
const ENEMY_TYPES = [
  { size: 12, speedMult: 1.19, color: '#ff0000', score: 10, chases: true },   // red - fast chaser, hunts purples
  { size: 12, speedMult: 1.02, color: '#ff8800', score: 15, chases: true },   // orange - fast chaser, avoids purples
  { size: 12, speedMult: 0.85, color: '#ffff00', score: 20, chases: false },  // yellow - wanderer
  { size: 12, speedMult: 0.68, color: '#8800ff', score: 30, chases: false },  // purple - rare neutral wanderer
  { size: 12, speedMult: 0.51, color: '#ff0088', score: 50, chases: false },  // pink - wanderer
];

// Predator (green) - chases all enemies, all enemies avoid it
const PREDATOR_SIZE = 12;
const PREDATOR_COLOR = '#00ff44';
const PREDATOR_SPEED_MULT = 0.459; // 90% of slowest enemy (0.51 * 0.9 = 0.459)
const PREDATOR_KILL_SPLIT = 10;   // splits after 10 kills
const PREDATOR_AVOID_DIST = 180;  // how far away enemies flee from predator

// Player
const player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  size: 12,
  speed: 2.5,
  angle: 0,
  color: '#0f0',
  vx: 0,
  vy: 0
};

// Input
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ' || e.key === 'r') e.preventDefault();
  if (e.key.toLowerCase() === 'r') restart();
  if (e.key === 'Escape') togglePause();
});
document.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

// Mouse for aiming
let mouseX = canvas.width / 2;
let mouseY = canvas.height / 2;
let mouseDown = false;

function updateMouse(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  mouseX = (e.clientX - rect.left) * scaleX;
  mouseY = (e.clientY - rect.top) * scaleY;
}

canvas.addEventListener('mousemove', updateMouse);
document.addEventListener('mousemove', e => {
  // Also track on document so it works when mouse leaves canvas
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  mouseX = (e.clientX - rect.left) * scaleX;
  mouseY = (e.clientY - rect.top) * scaleY;
});

canvas.addEventListener('mousedown', e => {
  if (e.button === 0) mouseDown = true;
});
document.addEventListener('mousedown', e => {
  if (e.button === 0) mouseDown = true;
});

canvas.addEventListener('mouseup', e => {
  if (e.button === 0) mouseDown = false;
});
document.addEventListener('mouseup', e => {
  if (e.button === 0) mouseDown = false;
});

function spawnEnemy() {
  if (enemies.length >= MAX_ENEMIES) return; // cap at 40
  const side = Math.floor(Math.random() * 4);
  let x, y;
  switch(side) {
    case 0: x = -20; y = Math.random() * canvas.height; break;
    case 1: x = canvas.width + 20; y = Math.random() * canvas.height; break;
    case 2: x = Math.random() * canvas.width; y = -20; break;
    case 3: x = Math.random() * canvas.width; y = canvas.height + 20; break;
  }
  // Pick enemy type - all types equal probability
  const typeRoll = Math.random();
  let type;
  if (typeRoll < 1/6) {
    // 1/6 chance each for all 6 types
    const baseSpeed = 0.6 + Math.random() * 1;
    const speed = baseSpeed * PREDATOR_SPEED_MULT;
    enemies.push({
      x, y, size: PREDATOR_SIZE, speed, color: PREDATOR_COLOR,
      typeScore: 100, chases: false, isPredator: true,
      kills: 0, wanderAngle: Math.random() * Math.PI * 2
    });
    return;
  } else if (typeRoll < 2/6) type = ENEMY_TYPES[0];  // red
  else if (typeRoll < 3/6) type = ENEMY_TYPES[1];    // orange
  else if (typeRoll < 4/6) type = ENEMY_TYPES[2];    // yellow
  else if (typeRoll < 5/6) type = ENEMY_TYPES[3];    // purple
  else type = ENEMY_TYPES[4];                         // pink
  const speed = (0.6 + Math.random() * 1) * type.speedMult;
  enemies.push({
    x, y, size: type.size, speed, color: type.color,
    typeScore: type.score, chases: type.chases,
    wanderAngle: Math.random() * Math.PI * 2
  });
}

function shoot() {
  const now = Date.now();
  const cooldown = fireSlow > 0 ? FIRE_SLOW_COOLDOWN : SHOT_COOLDOWN;
  if (now - lastShot < cooldown) return;
  lastShot = now;

  const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
  const speed = 8;
  bullets.push({
    x: player.x,
    y: player.y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    size: 4,
    life: 120
  });
}

function createExplosion(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30 + Math.random() * 20,
      color,
      size: Math.random() * 3 + 1
    });
  }
}

function restart() {
  score = 0;
  wave = 1;
  lives = 3;
  gameOver = false;
  bullets = [];
  enemies = [];
  particles = [];
  player.x = canvas.width / 2;
  player.y = canvas.height / 2;
  document.getElementById('gameover').style.display = 'none';
  updateUI();
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('pauseBtn');
  btn.textContent = paused ? '[RESUME]' : '[PAUSE]';
  btn.style.color = paused ? '#ff0' : '#888';
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('wave').textContent = wave;
  document.getElementById('lives').textContent = lives;
  const countEl = document.getElementById('enemyCount');
  const currentCount = parseInt(countEl.textContent) || 0;
  const liveCount = enemies.filter(e => !e.dead).length;
  if (liveCount !== currentCount) {
    countEl.textContent = liveCount;
  }
  document.getElementById('enemyCap').style.display = liveCount >= MAX_ENEMIES ? 'block' : 'none';
  // Predator indicator
  const predCount = enemies.filter(e => e.isPredator && !e.dead).length;
  let predEl = document.getElementById('predatorWarn');
  if (predCount > 0) {
    if (!predEl) {
      predEl = document.createElement('div');
      predEl.id = 'predatorWarn';
      predEl.style.cssText = 'color:#0f4;margin-top:4px;animation:pulse 0.5s infinite alternate';
      document.getElementById('ui').appendChild(predEl);
    }
    predEl.textContent = `🟢 PREDATOR x${predCount} - SHOOT TO KILL`;
  } else if (predEl) {
    predEl.remove();
  }
  // Add slow fire warning
  let warning = '';
  if (fireSlow > 0) {
    warning += '<div style="color:#ff0;margin-top:8px;animation:pulse 0.5s infinite alternate">⚠ SLOW FIRE ⚠</div>';
  }
  if (corneredTimer > 0) {
    const seconds = Math.ceil((CORNERED_THRESHOLD - corneredTimer) / 60);
    warning += `<div style="color:#f80;margin-top:4px">⏱ CORNERED: ${seconds}s</div>`;
  }
  const ui = document.getElementById('ui');
  const existing = ui.querySelector('.warning');
  if (warning && !existing) {
    const el = document.createElement('div');
    el.className = 'warning';
    el.innerHTML = warning;
    ui.appendChild(el);
  } else if (!warning && existing) {
    existing.remove();
  } else if (warning && existing) {
    existing.innerHTML = warning;
  }
}

function update() {
  if (gameOver) return;

  // Player movement
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) dy -= 1;
  if (keys['s'] || keys['arrowdown']) dy += 1;
  if (keys['a'] || keys['arrowleft']) dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;

  if (dx !== 0 || dy !== 0) {
    const len = Math.sqrt(dx * dx + dy * dy);
    player.x += (dx / len) * player.speed;
    player.y += (dy / len) * player.speed;
  }

  // Apply velocity with friction (smooth glide, not teleport)
  player.x += player.vx;
  player.y += player.vy;
  player.vx *= 0.85;
  player.vy *= 0.85;
  // Stop tiny drift
  if (Math.abs(player.vx) < 0.1) player.vx = 0;
  if (Math.abs(player.vy) < 0.1) player.vy = 0;

  // Clamp player to canvas (10px border buffer)
  player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
  player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

  // Check if player is cornered
  const nearLeft = player.x < player.size + 55;
  const nearRight = player.x > canvas.width - player.size - 55;
  const nearTop = player.y < player.size + 55;
  const nearBottom = player.y > canvas.height - player.size - 55;
  const nearWall = nearLeft || nearRight || nearTop || nearBottom;
  const inCorner = (nearLeft && nearTop) || (nearRight && nearTop) ||
                   (nearLeft && nearBottom) || (nearRight && nearBottom);

  if (inCorner) {
    // Check if player is not moving away from the corner
    const movingAway = (nearLeft && keys['d']) || (nearRight && keys['a']) ||
                       (nearTop && keys['s']) || (nearBottom && keys['w']);
    if (!movingAway) {
      corneredTimer++;
    } else {
      corneredTimer = Math.max(0, corneredTimer - 10); // Slowly recover
    }
    if (corneredTimer >= CORNERED_THRESHOLD) {
      gameOver = true;
      document.getElementById('gameover').style.display = 'block';
    }
  } else {
    corneredTimer = Math.max(0, corneredTimer - 20); // Recover faster when not in corner
  }

  // Aim
  player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);

  // Shoot
  if (mouseDown) shoot();

  // Update bullets
  bullets = bullets.filter(b => {
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
    return b.life > 0 && b.x > 0 && b.x < canvas.width && b.y > 0 && b.y < canvas.height;
  });

  // Spawn enemies
  const spawnRate = Math.max(30, 120 - wave * 10);
  if (Math.random() < 1 / spawnRate) {
    spawnEnemy();
  }

// Update enemies with complex AI
  enemies.forEach(e => {
    // PREDATOR LOGIC: chases all non-predator enemies
    if (e.isPredator) {
      let nearestTarget = null;
      let nearestDist = Infinity;
      enemies.forEach(other => {
        if (other !== e && !other.isPredator && !other.dead) {
          const d = Math.hypot(other.x - e.x, other.y - e.y);
          if (d < nearestDist) {
            nearestDist = d;
            nearestTarget = other;
          }
        }
      });
      if (nearestTarget) {
        const angle = Math.atan2(nearestTarget.y - e.y, nearestTarget.x - e.x);
        e.x += Math.cos(angle) * e.speed;
        e.y += Math.sin(angle) * e.speed;
      } else {
        // No targets, wander with wall avoidance
        const margin = 80;
        const nearLeft = e.x < margin;
        const nearRight = e.x > canvas.width - margin;
        const nearTop = e.y < margin;
        const nearBottom = e.y > canvas.height - margin;
        let steerX = 0, steerY = 0;
        if (nearLeft) steerX += 1;
        if (nearRight) steerX -= 1;
        if (nearTop) steerY += 1;
        if (nearBottom) steerY -= 1;
        if (steerX !== 0 || steerY !== 0) {
          const steerAngle = Math.atan2(steerY, steerX);
          e.wanderAngle += (steerAngle - e.wanderAngle) * 0.1;
        }
        e.x += Math.cos(e.wanderAngle) * e.speed;
        e.y += Math.sin(e.wanderAngle) * e.speed;
        if (Math.random() < 0.02) e.wanderAngle += (Math.random() - 0.5) * 2;
      }
      // BOUNDARY CLAMP: predator stays within canvas
      e.x = Math.max(e.size, Math.min(canvas.width - e.size, e.x));
      e.y = Math.max(e.size, Math.min(canvas.height - e.size, e.y));
      return; // Predator done, skip regular logic
    }

    // REGULAR ENEMIES: check for nearest predator to flee from
    let nearestPredator = null;
    let nearestPredDist = Infinity;
    enemies.forEach(other => {
      if (other.isPredator && !other.dead) {
        const d = Math.hypot(other.x - e.x, other.y - e.y);
        if (d < nearestPredDist) {
          nearestPredDist = d;
          nearestPredator = other;
        }
      }
    });

    if (nearestPredator && nearestPredDist < PREDATOR_AVOID_DIST) {
      // Flee from predator
      const angle = Math.atan2(e.y - nearestPredator.y, e.x - nearestPredator.x);
      e.x += Math.cos(angle) * e.speed * 1.5;
      e.y += Math.sin(angle) * e.speed * 1.5;
      return; // Done fleeing, skip other behavior
    }

    if (e.chases) {
      const distToPlayer = Math.hypot(player.x - e.x, player.y - e.y);
      const isRed = e.color === '#ff0000';
      const isOrange = e.color === '#ff8800';

      // Find nearest purple
      let nearestPurple = null;
      let nearestPurpleDist = Infinity;
      enemies.forEach(other => {
        if (other.color === '#8800ff' && !other.dead) {
          const d = Math.hypot(other.x - e.x, other.y - e.y);
          if (d < nearestPurpleDist) {
            nearestPurpleDist = d;
            nearestPurple = other;
          }
        }
      });

      if (isRed) {
        // Reds chase purples, switch to player if closer
        if (nearestPurple && nearestPurpleDist < distToPlayer) {
          // Chase purple
          const angle = Math.atan2(nearestPurple.y - e.y, nearestPurple.x - e.x);
          e.x += Math.cos(angle) * e.speed;
          e.y += Math.sin(angle) * e.speed;
        } else {
          // Chase player
          const angle = Math.atan2(player.y - e.y, player.x - e.x);
          e.x += Math.cos(angle) * e.speed;
          e.y += Math.sin(angle) * e.speed;
        }
      } else if (isOrange) {
        // Oranges avoid purples, chase player
        if (nearestPurple && nearestPurpleDist < 150) {
          // Move away from purple
          const angle = Math.atan2(e.y - nearestPurple.y, e.x - nearestPurple.x);
          e.x += Math.cos(angle) * e.speed * 1.3;
          e.y += Math.sin(angle) * e.speed * 1.3;
        } else {
          // Chase player
          const angle = Math.atan2(player.y - e.y, player.x - e.x);
          e.x += Math.cos(angle) * e.speed;
          e.y += Math.sin(angle) * e.speed;
        }
      }
    }

    // BOUNDARY CLAMP: all enemies stay within canvas
    e.x = Math.max(e.size, Math.min(canvas.width - e.size, e.x));
    e.y = Math.max(e.size, Math.min(canvas.height - e.size, e.y));

    if (e.color === '#8800ff') {
      // Purple - wanderer, check for 4+ reds nearby
      let redCount = 0;
      enemies.forEach(other => {
        if (other.color === '#ff0000' && !other.dead) {
          const d = Math.hypot(other.x - e.x, other.y - e.y);
          if (d < 80) redCount++;
        }
      });
      if (redCount >= 4) {
        e.dead = true; // Die when surrounded by 4+ reds
        createExplosion(e.x, e.y, '#8800ff', 15);
      } else {
        // Normal wandering
        e.x += Math.cos(e.wanderAngle) * e.speed;
        e.y += Math.sin(e.wanderAngle) * e.speed;
        if (Math.random() < 0.01) {
          e.wanderAngle += (Math.random() - 0.5) * 2;
        }
      }
    } else {
      // Yellow and pink - normal wanderers
      e.x += Math.cos(e.wanderAngle) * e.speed;
      e.y += Math.sin(e.wanderAngle) * e.speed;
      if (Math.random() < 0.01) {
        e.wanderAngle += (Math.random() - 0.5) * 2;
      }
    }
  });

  // Bullet-enemy collision - enemies compress before dying
  bullets.forEach(b => {
    enemies.forEach(e => {
      const dist = Math.hypot(b.x - e.x, b.y - e.y);
      if (dist < b.size + e.size) {
        b.life = 0;
        e.compressing = 15; // frames to compress before dying
        e.dead = true;
        score += e.typeScore || 10;
        createExplosion(e.x, e.y, e.color, 8);
      }
    });
  });

  // Player-enemy collision - velocity-based bounce (smooth glide)
  enemies.forEach(e => {
    const dist = Math.hypot(player.x - e.x, player.y - e.y);
    if (dist < player.size + e.size) {
      const baseAngle = Math.atan2(player.y - e.y, player.x - e.x);
      const sizeRatio = e.size / 15;
      const pushForce = 10 + (sizeRatio * 10); // 10-28 range - solid push

      // Apply velocity (not direct position) for smooth glide
      const angle = baseAngle + (Math.random() - 0.5) * 0.3;
      player.vx += Math.cos(angle) * pushForce;
      player.vy += Math.sin(angle) * pushForce;

      // Clamp player to canvas
      player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
      player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

      // Enemy bounces back gently
      const eAngle = baseAngle + Math.PI;
      e.x += Math.cos(eAngle) * pushForce * 0.6;
      e.y += Math.sin(eAngle) * pushForce * 0.6;

      // Slow fire on contact
      fireSlow = FIRE_SLOW_DURATION;

      // Small impact particles
      createExplosion(player.x, player.y, '#ff0', 4);
    }
  });

  // Enemy-enemy collision - complex interactions
  for (let i = 0; i < enemies.length; i++) {
    for (let j = i + 1; j < enemies.length; j++) {
      const a = enemies[i], b = enemies[j];
      const dist = Math.hypot(a.x - b.x, a.y - b.y);
      const minDist = a.size + b.size + 4; // +4 for gap
      if (dist < minDist && dist > 0) {
        const angle = Math.atan2(b.y - a.y, b.x - a.x);
        const overlap = minDist - dist;
        // Push apart with extra force to prevent clumping
        const push = overlap * 0.8 + 2; // minimum 2px push
        a.x -= Math.cos(angle) * push;
        a.y -= Math.sin(angle) * push;
        b.x += Math.cos(angle) * push;
        b.y += Math.sin(angle) * push;

        // Purple + Red collision: purple dies
        if ((a.color === '#8800ff' && b.color === '#ff0000') ||
            (b.color === '#8800ff' && a.color === '#ff0000')) {
          const purple = a.color === '#8800ff' ? a : b;
          const red = a.color === '#8800ff' ? b : a;
          purple.dead = true;
          createExplosion(purple.x, purple.y, '#8800ff', 12);
          i = enemies.length;
          break;
        }

        // Predator + non-predator: predator kills on contact
        if (a.isPredator && !b.isPredator) {
          b.dead = true;
          createExplosion(b.x, b.y, b.color, 12);
          a.kills = (a.kills || 0) + 1;
          if (a.kills >= PREDATOR_KILL_SPLIT && enemies.length < MAX_ENEMIES) {
            a.dead = true;
            for (let k = 0; k < 2; k++) {
              const spawnAngle = Math.random() * Math.PI * 2;
              const newSpeed = a.speed * (0.9 + Math.random() * 0.2);
              enemies.push({
                x: a.x + Math.cos(spawnAngle) * 15,
                y: a.y + Math.sin(spawnAngle) * 15,
                size: PREDATOR_SIZE,
                speed: newSpeed,
                color: PREDATOR_COLOR,
                typeScore: 100,
                chases: false,
                isPredator: true,
                kills: 0,
                wanderAngle: spawnAngle
              });
            }
            createExplosion(a.x, a.y, PREDATOR_COLOR, 20);
          }
          i = enemies.length;
          break;
        }
        if (b.isPredator && !a.isPredator) {
          a.dead = true;
          createExplosion(a.x, a.y, a.color, 12);
          b.kills = (b.kills || 0) + 1;
          if (b.kills >= PREDATOR_KILL_SPLIT && enemies.length < MAX_ENEMIES) {
            b.dead = true;
            for (let k = 0; k < 2; k++) {
              const spawnAngle = Math.random() * Math.PI * 2;
              const newSpeed = b.speed * (0.9 + Math.random() * 0.2);
              enemies.push({
                x: b.x + Math.cos(spawnAngle) * 15,
                y: b.y + Math.sin(spawnAngle) * 15,
                size: PREDATOR_SIZE,
                speed: newSpeed,
                color: PREDATOR_COLOR,
                typeScore: 100,
                chases: false,
                isPredator: true,
                kills: 0,
                wanderAngle: spawnAngle
              });
            }
            createExplosion(b.x, b.y, PREDATOR_COLOR, 20);
          }
          i = enemies.length;
          break;
        }

        // Wanderer + chaser collision: wanderer dies, 2 faster chasers born (skip predators)
        if (a.chases !== b.chases && !a.isPredator && !b.isPredator && enemies.length < MAX_ENEMIES) {
          const wanderer = a.chases ? b : a;
          const chaser = a.chases ? a : b;
          wanderer.dead = true;
          for (let k = 0; k < 2; k++) {
            const spawnAngle = Math.random() * Math.PI * 2;
            enemies.push({
              x: chaser.x + Math.cos(spawnAngle) * 10,
              y: chaser.y + Math.sin(spawnAngle) * 10,
              size: 12,
              speed: chaser.speed * 1.5,
              color: chaser.color,
              typeScore: chaser.typeScore,
              chases: true,
              wanderAngle: spawnAngle
            });
          }
          createExplosion(wanderer.x, wanderer.y, '#ff0', 12);
          i = enemies.length;
          break;
        }
      }
    }
  }

  // Clean up dead enemies
  const before = enemies.length;
  enemies = enemies.filter(e => {
    if (e.dead) {
      return false;
    }
    return true;
  });
  if (before !== enemies.length) {
    // Re-check spawn cap after cleanup
  }

  // PREDATOR-ENEMY collision: predator kills everything it touches, splits after 10 kills (any color)
  for (let i = 0; i < enemies.length; i++) {
    const a = enemies[i];
    if (!a.isPredator) continue;
    for (let j = 0; j < enemies.length; j++) {
      if (i === j) continue;
      const b = enemies[j];
      if (b.dead || b.isPredator) continue;
      const dist = Math.hypot(a.x - b.x, a.y - b.y);
      if (dist < a.size + b.size) {
        b.dead = true;
        createExplosion(b.x, b.y, b.color, 12);
        // All enemies count as kills for splitting
        a.kills = (a.kills || 0) + 1;
        if (a.kills >= PREDATOR_KILL_SPLIT) {
          // SPLIT: original predator dies, 2 new predators are born
          a.dead = true;
          for (let k = 0; k < 2; k++) {
            const spawnAngle = Math.random() * Math.PI * 2;
            const newSpeed = a.speed * (0.9 + Math.random() * 0.2);
            enemies.push({
              x: a.x + Math.cos(spawnAngle) * 15,
              y: a.y + Math.sin(spawnAngle) * 15,
              size: PREDATOR_SIZE,
              speed: newSpeed,
              color: PREDATOR_COLOR,
              typeScore: 100,
              chases: false,
              isPredator: true,
              kills: 0,
              wanderAngle: spawnAngle
            });
          }
          createExplosion(a.x, a.y, PREDATOR_COLOR, 20);
        }
      }
    }
  }

  // Wave progression
  const newWave = Math.floor(score / 100) + 1;
  if (newWave > wave) {
    wave = newWave;
  }

  // Update particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.95;
    p.vy *= 0.95;
    p.life--;
    return p.life > 0;
  });

  // Countdown fire slow
  if (fireSlow > 0) fireSlow--;

  // FINAL BOUNDARY CLAMP: all enemies must stay within canvas after all collisions
  enemies.forEach(e => {
    e.x = Math.max(e.size, Math.min(canvas.width - e.size, e.x));
    e.y = Math.max(e.size, Math.min(canvas.height - e.size, e.y));
  });

  updateUI();
}

function draw() {
  // Clear
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  for (let x = 0; x < canvas.width; x += 40) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += 40) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  // Draw particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 50;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Draw bullets
  ctx.fillStyle = '#ff0';
  ctx.shadowColor = '#ff0';
  ctx.shadowBlur = 10;
  bullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.shadowBlur = 0;

  // Draw enemies
  enemies.forEach(e => {
    ctx.save();
    ctx.translate(e.x, e.y);

    if (e.isPredator) {
      // PREDATOR: pulsing green glow + kill counter
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 100);
      ctx.shadowColor = PREDATOR_COLOR;
      ctx.shadowBlur = 15 + pulse * 10;
      ctx.fillStyle = PREDATOR_COLOR;
      ctx.beginPath();
      ctx.arc(0, 0, e.size, 0, Math.PI * 2);
      ctx.fill();
      // Inner eye
      ctx.fillStyle = '#003300';
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.arc(0, 0, e.size * 0.5, 0, Math.PI * 2);
      ctx.fill();
      // Kill counter ring
      const killRatio = (e.kills || 0) / PREDATOR_KILL_SPLIT;
      ctx.strokeStyle = `rgba(0, 255, 68, ${0.3 + killRatio * 0.7})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, e.size + 4, -Math.PI / 2, -Math.PI / 2 + killRatio * Math.PI * 2);
      ctx.stroke();
      // Kill count text
      ctx.fillStyle = '#fff';
      ctx.font = '8px Courier New';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`${e.kills || 0}/${PREDATOR_KILL_SPLIT}`, 0, 0);
    } else {
      // REGULAR ENEMY
      ctx.fillStyle = e.color;
      ctx.shadowColor = e.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(0, 0, e.size, 0, Math.PI * 2);
      ctx.fill();
      // Inner detail
      ctx.fillStyle = '#000';
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.arc(0, 0, e.size * 0.4, 0, Math.PI * 2);
      ctx.fill();
      // Ring indicator
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, 0, e.size + 3, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.restore();
  });
  ctx.shadowBlur = 0;

  // Draw player
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.angle);

  // Body
  const bodyColor = fireSlow > 0 ? '#ff0' : player.color;
  ctx.fillStyle = bodyColor;
  ctx.shadowColor = bodyColor;
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.arc(0, 0, player.size, 0, Math.PI * 2);
  ctx.fill();

  // Gun barrel
  ctx.fillStyle = fireSlow > 0 ? '#aa0' : '#0a0';
  ctx.shadowBlur = 0;
  ctx.fillRect(0, -4, player.size + 10, 8);

  // Center dot
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(0, 0, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
  ctx.shadowBlur = 0;

  // Crosshair
  ctx.strokeStyle = '#0f0';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(mouseX, mouseY, 10, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(mouseX - 15, mouseY);
  ctx.lineTo(mouseX - 5, mouseY);
  ctx.moveTo(mouseX + 5, mouseY);
  ctx.lineTo(mouseX + 15, mouseY);
  ctx.moveTo(mouseX, mouseY - 15);
  ctx.lineTo(mouseX, mouseY - 5);
  ctx.moveTo(mouseX, mouseY + 5);
  ctx.lineTo(mouseX, mouseY + 15);
  ctx.stroke();

  // PAUSED overlay
  if (paused) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ff0';
    ctx.font = '48px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
    ctx.font = '16px Courier New';
    ctx.fillStyle = '#888';
    ctx.fillText('Press ESC to resume', canvas.width / 2, canvas.height / 2 + 40);
  }
}

function gameLoop() {
  if (!paused && !gameOver) {
    update();
  }
  draw();
  requestAnimationFrame(gameLoop);
}

updateUI();
gameLoop();
</script>
</body>
</html>
